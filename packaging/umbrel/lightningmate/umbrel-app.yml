# Umbrel App Store manifest for LightningMate (official-store reference copy).
# For the official store: copy this folder into a fork of
# github.com/getumbrel/umbrel-apps as `lightningmate/`. The community-store copy
# uses the store-prefixed id `opensourceminers-lightningmate`.
# Add gallery screenshots (1.jpg–3.jpg) before public submission.
manifestVersion: 1
id: lightningmate
category: finance
name: LightningMate
version: "0.4.2"
tagline: Profit-aware management & autopilot for your Lightning node
description: >-
  LightningMate manages your Lightning node so you don't have to babysit it.
  Connects automatically to your Umbrel Lightning (LND) node.


  See channels with live balance bars and source / sink / router roles, a full
  Forwards routing report, and a Profit & Loss overview (routing revenue vs
  channel-open and rebalancing costs). Get scored channel-peer suggestions from
  the network graph and open channels in a click.


  Flip on the Autopilot and the node tunes its own fees and runs only profitable
  rebalances on recommended settings — with safe caps and per-channel cooldowns.
  Read-only by default; writes are opt-in.
releaseNotes: >-
  Fee + rebalance autopilot, channel suggestions with one-click open, Forwards
  report, and Profit & Loss overview.
developer: Open Source Miners
website: https://opensourceminers.de
dependencies:
  - lightning
repo: https://github.com/opensourceminers/lightningmate
support: https://github.com/opensourceminers/lightningmate/issues
port: 3001
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: opensourceminers
submission: https://github.com/getumbrel/umbrel-apps/pull/XXXX
