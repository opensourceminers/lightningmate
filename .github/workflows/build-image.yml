name: build-image

# Builds the multi-arch (amd64 + arm64) LightningMate image and pushes it to the
# GitHub Container Registry (ghcr.io/<owner>/lightningmate). Runs on version tags
# (v*) or manually. The resulting image digest is printed in the run summary —
# paste it into packaging/umbrel/lightningmate/docker-compose.yml.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. 0.4.0)"
        default: "dev"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.event.inputs.tag || github.ref_name }}

      - name: Report digest
        run: |
          {
            echo "### 🐳 Image pushed"
            echo ""
            echo "Tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "Paste \`ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}\` into packaging/umbrel/lightningmate/docker-compose.yml."
          } >> "$GITHUB_STEP_SUMMARY"
